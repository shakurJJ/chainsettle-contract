name: Test Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  coverage:
    name: Measure Test Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          cargo llvm-cov \
            --workspace \
            --lcov \
            --output-path lcov.info \
            --ignore-filename-regex '(test|mock)'

      - name: Generate HTML report (artifact)
        run: |
          cargo llvm-cov report \
            --html \
            --output-dir coverage-html \
            --ignore-filename-regex '(test|mock)'

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce 80% minimum coverage
        run: |
          COVERAGE=$(cargo llvm-cov report \
            --ignore-filename-regex '(test|mock)' \
            2>/dev/null | grep 'TOTAL' | awk '{print $10}' | tr -d '%')
          echo "Overall line coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "Could not parse coverage output — checking via lcov"
            COVERAGE=$(lcov --summary lcov.info 2>&1 | grep 'lines......:' | awk '{print $2}' | tr -d '%')
            echo "lcov line coverage: ${COVERAGE}%"
          fi
          if awk "BEGIN{exit !($COVERAGE < 80)}"; then
            echo "Coverage ${COVERAGE}% is below the required 80% threshold."
            exit 1
          fi
          echo "Coverage gate passed: ${COVERAGE}% >= 80%"
